services:
  db:
    image: mysql
    container_name: mysql-db
    environment:
    
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: testdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
volumes:
    mysql_data:

  